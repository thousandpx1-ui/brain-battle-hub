<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Block Blast Puzzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
    }

    .game-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .score-box, .time-box {
      text-align: center;
    }

    .score-label, .time-label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value, .time-value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 5px;
    }

    .time-value.warning {
      color: #ff6b6b;
      animation: pulse 0.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .grid-container {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 10px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .grid {
      display: grid;
      gap: 4px;
      position: relative;
    }

    .block {
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.2s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .block:hover {
      transform: scale(1.05);
      filter: brightness(1.2);
    }

    .block.selected {
      animation: selectedPulse 0.3s ease-in-out;
      filter: brightness(1.3);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    @keyframes selectedPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .block.blasting {
      animation: blastAnimation 0.4s ease-out forwards;
    }

    @keyframes blastAnimation {
      0% { 
        transform: scale(1); 
        opacity: 1; 
      }
      50% { 
        transform: scale(1.3); 
        opacity: 0.8; 
      }
      100% { 
        transform: scale(0); 
        opacity: 0; 
      }
    }

    .block.falling {
      animation: fallAnimation 0.3s ease-out;
    }

    @keyframes fallAnimation {
      0% { 
        transform: translateY(-50px); 
        opacity: 0; 
      }
      100% { 
        transform: translateY(0); 
        opacity: 1; 
      }
    }

    /* Block Colors */
    .block.color-1 {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
    }

    .block.color-2 {
      background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
      box-shadow: 0 4px 15px rgba(34, 211, 238, 0.4);
    }

    .block.color-3 {
      background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
      box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4);
    }

    .block.color-4 {
      background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      box-shadow: 0 4px 15px rgba(167, 139, 250, 0.4);
    }

    .block.color-5 {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
    }

    .particles {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: particleFly 0.6s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    .footer {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .booster-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .booster-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .booster-btn:active {
      transform: translateY(0);
    }

    .booster-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Game Over Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      width: 350px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: scale(0.8);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h2 {
      font-size: 32px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .modal-score {
      font-size: 48px;
      font-weight: bold;
      color: #4ade80;
      margin: 20px 0;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      color: white;
    }

    .modal-btn.secondary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
    }

    .combo-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      animation: comboPop 1s ease-out forwards;
    }

    @keyframes comboPop {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }

    .score-popup {
      position: absolute;
      font-size: 24px;
      font-weight: bold;
      color: #4ade80;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.8);
      pointer-events: none;
      z-index: 15;
      animation: scoreFloat 0.8s ease-out forwards;
    }

    @keyframes scoreFloat {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-50px) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="header">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="time-box">
        <div class="time-label">Time</div>
        <div class="time-value" id="time">60</div>
      </div>
    </div>

    <div class="grid-container">
      <div class="grid" id="grid"></div>
      <div class="particles" id="particles"></div>
    </div>

    <div class="footer">
      <button class="booster-btn" id="bombBtn" onclick="useBomb()">💣 Bomb (3)</button>
      <button class="booster-btn" id="shuffleBtn" onclick="shuffleGrid()">🔀 Shuffle (2)</button>
    </div>
  </div>

  <div class="modal-overlay" id="gameOverModal">
    <div class="modal">
      <h2>Game Over!</h2>
      <p>Your Final Score</p>
      <div class="modal-score" id="finalScore">0</div>
      <div class="modal-buttons">
        <button class="modal-btn primary" onclick="restartGame()">🔄 Play Again</button>
        <button class="modal-btn secondary" onclick="watchAd()">📺 Watch Ad +10s</button>
      </div>
    </div>
  </div>

  <script>
    // Game Configuration
    const ROWS = 8;
    const COLS = 6;
    const COLORS = 5;
    const INITIAL_TIME = 60;
    const MIN_GROUP_SIZE = 3;

    // Game State
    let grid = [];
    let score = 0;
    let time = INITIAL_TIME;
    let isProcessing = false;
    let timerInterval = null;
    let lastTimeUpdate = Date.now();
    let bombs = 3;
    let shuffles = 2;
    let comboCount = 0;

    // DOM Elements
    const gridElement = document.getElementById('grid');
    const particlesElement = document.getElementById('particles');
    const scoreElement = document.getElementById('score');
    const timeElement = document.getElementById('time');
    const gameOverModal = document.getElementById('gameOverModal');
    const finalScoreElement = document.getElementById('finalScore');
    const bombBtn = document.getElementById('bombBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');

    // Initialize Game
    function init() {
      createGrid();
      renderGrid();
      startTimer();
      updateUI();
      
      // Ensure there's at least one valid move
      while (!hasValidMoves()) {
        shuffleGridInternal();
      }
    }

    // Create Initial Grid
    function createGrid() {
      grid = [];
      for (let row = 0; row < ROWS; row++) {
        grid[row] = [];
        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomColor();
        }
      }
      
      // Remove any initial matches
      let hasMatches = true;
      while (hasMatches) {
        hasMatches = false;
        for (let row = 0; row < ROWS; row++) {
          for (let col = 0; col < COLS; col++) {
            const group = findGroup(row, col);
            if (group.length >= MIN_GROUP_SIZE) {
              hasMatches = true;
              group.forEach(([r, c]) => {
                grid[r][c] = randomColor();
              });
            }
          }
        }
      }
    }

    // Get Random Color
    function randomColor() {
      return Math.floor(Math.random() * COLORS) + 1;
    }

    // Render Grid
    function renderGrid() {
      gridElement.innerHTML = '';
      gridElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const block = document.createElement('div');
          block.className = `block color-${grid[row][col]}`;
          block.dataset.row = row;
          block.dataset.col = col;
          block.onclick = () => handleBlockClick(row, col);
          gridElement.appendChild(block);
        }
      }
    }

    // Find Connected Group (Flood Fill with bounds checking)
    function findGroup(startRow, startCol, targetColor = null) {
      const color = targetColor || grid[startRow][startCol];
      if (color === null) return [];
      
      const stack = [[startRow, startCol]];
      const visited = new Set();
      const group = [];
      
      while (stack.length > 0) {
        const [row, col] = stack.pop();
        const key = `${row},${col}`;
        
        if (visited.has(key)) continue;
        if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
        if (grid[row][col] !== color) continue;
        
        visited.add(key);
        group.push([row, col]);
        
        stack.push([row + 1, col]);
        stack.push([row - 1, col]);
        stack.push([row, col + 1]);
        stack.push([row, col - 1]);
      }
      
      return group;
    }

    // Handle Block Click
    async function handleBlockClick(row, col) {
      if (isProcessing || time <= 0) return;
      
      const group = findGroup(row, col);
      
      if (group.length < MIN_GROUP_SIZE) {
        // Highlight briefly to show it's not enough
        const blocks = getBlockElements(group);
        blocks.forEach(block => block.classList.add('selected'));
        setTimeout(() => blocks.forEach(block => block.classList.remove('selected')), 300);
        return;
      }
      
      await processBlast(group);
    }

    // Process Blast
    async function processBlast(group, isCombo = false) {
      isProcessing = true;
      
      // Calculate score
      const baseScore = group.length * 2;
      const comboMultiplier = isCombo ? comboCount : 1;
      const points = baseScore * comboMultiplier;
      
      // Visual feedback
      const blocks = getBlockElements(group);
      blocks.forEach(block => block.classList.add('blasting'));
      
      // Create particles
      const centerBlock = blocks[Math.floor(blocks.length / 2)];
      const rect = centerBlock.getBoundingClientRect();
      const containerRect = gridElement.getBoundingClientRect();
      const x = rect.left - containerRect.left + rect.width / 2;
      const y = rect.top - containerRect.top + rect.height / 2;
      createParticles(x, y, grid[group[0][0]][group[0][1]]);
      
      // Show score popup
      showScorePopup(points, x, y);
      
      // Update score
      score += points;
      time = Math.min(time + 3, 120); // Cap at 120 seconds
      
      if (isCombo) {
        showComboText(comboCount);
      }
      
      updateUI();
      
      // Wait for blast animation
      await sleep(400);
      
      // Remove blocks
      group.forEach(([row, col]) => {
        grid[row][col] = null;
      });
      
      // Apply gravity
      applyGravity();
      
      // Render and wait for fall animation
      renderGridWithAnimation('falling');
      await sleep(300);
      
      // Spawn new blocks
      spawnNewBlocks();
      renderGridWithAnimation('falling');
      await sleep(300);
      
      // Check for combos
      const newGroup = findComboMatch();
      if (newGroup && newGroup.length >= MIN_GROUP_SIZE) {
        comboCount++;
        await processBlast(newGroup, true);
      } else {
        comboCount = 0;
        isProcessing = false;
        
        // Check if no valid moves
        if (!hasValidMoves()) {
          shuffleGridInternal();
        }
      }
    }

    // Find Combo Match
    function findComboMatch() {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          if (grid[row][col] !== null) {
            const group = findGroup(row, col);
            if (group.length >= MIN_GROUP_SIZE) {
              return group;
            }
          }
        }
      }
      return null;
    }

    // Apply Gravity (blocks fall down)
    function applyGravity() {
      for (let col = 0; col < COLS; col++) {
        let writeRow = ROWS - 1;
        
        for (let row = ROWS - 1; row >= 0; row--) {
          if (grid[row][col] !== null) {
            if (row !== writeRow) {
              grid[writeRow][col] = grid[row][col];
              grid[row][col] = null;
            }
            writeRow--;
          }
        }
      }
    }

    // Spawn New Blocks
    function spawnNewBlocks() {
      for (let col = 0; col < COLS; col++) {
        for (let row = 0; row < ROWS; row++) {
          if (grid[row][col] === null) {
            grid[row][col] = randomColor();
          }
        }
      }
    }

    // Render Grid with Animation Class
    function renderGridWithAnimation(animationClass) {
      gridElement.innerHTML = '';
      gridElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const block = document.createElement('div');
          block.className = `block color-${grid[row][col]} ${animationClass}`;
          block.dataset.row = row;
          block.dataset.col = col;
          block.onclick = () => handleBlockClick(row, col);
          gridElement.appendChild(block);
        }
      }
    }

    // Get Block Elements
    function getBlockElements(group) {
      return group.map(([row, col]) => {
        return gridElement.children[row * COLS + col];
      });
    }

    // Create Particles
    function createParticles(x, y, colorIndex) {
      const colors = ['#4ade80', '#22d3ee', '#f472b6', '#a78bfa', '#fbbf24'];
      const color = colors[colorIndex - 1];
      
      for (let i = 0; i < 12; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.background = color;
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        
        const angle = (Math.PI * 2 * i) / 12;
        const distance = 50 + Math.random() * 30;
        particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
        
        particlesElement.appendChild(particle);
        
        setTimeout(() => particle.remove(), 600);
      }
    }

    // Show Score Popup
    function showScorePopup(points, x, y) {
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = '+' + points;
      popup.style.left = x + 'px';
      popup.style.top = y + 'px';
      particlesElement.appendChild(popup);
      
      setTimeout(() => popup.remove(), 800);
    }

    // Show Combo Text
    function showComboText(combo) {
      const comboText = document.createElement('div');
      comboText.className = 'combo-text';
      comboText.textContent = combo + 'x COMBO!';
      gridElement.parentElement.appendChild(comboText);
      
      setTimeout(() => comboText.remove(), 1000);
    }

    // Check for Valid Moves
    function hasValidMoves() {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const group = findGroup(row, col);
          if (group.length >= MIN_GROUP_SIZE) {
            return true;
          }
        }
      }
      return false;
    }

    // Use Bomb Booster
    async function useBomb() {
      if (isProcessing || time <= 0 || bombs <= 0) return;
      
      bombs--;
      updateUI();
      
      // Select random block and destroy 3x3 area
      const centerRow = Math.floor(Math.random() * ROWS);
      const centerCol = Math.floor(Math.random() * COLS);
      
      const bombGroup = [];
      for (let row = centerRow - 1; row <= centerRow + 1; row++) {
        for (let col = centerCol - 1; col <= centerCol + 1; col++) {
          if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            bombGroup.push([row, col]);
          }
        }
      }
      
      await processBlast(bombGroup);
    }

    // Shuffle Grid
    async function shuffleGrid() {
      if (isProcessing || time <= 0 || shuffles <= 0) return;
      
      shuffles--;
      updateUI();
      
      shuffleGridInternal();
      renderGrid();
      await sleep(300);
    }

    // Internal Shuffle (no cost)
    function shuffleGridInternal() {
      const allColors = [];
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          allColors.push(grid[row][col]);
        }
      }
      
      // Fisher-Yates shuffle
      for (let i = allColors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allColors[i], allColors[j]] = [allColors[j], allColors[i]];
      }
      
      let idx = 0;
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          grid[row][col] = allColors[idx++];
        }
      }
      
      // Ensure no initial matches
      let hasMatches = true;
      let attempts = 0;
      while (hasMatches && attempts < 10) {
        hasMatches = false;
        for (let row = 0; row < ROWS; row++) {
          for (let col = 0; col < COLS; col++) {
            const group = findGroup(row, col);
            if (group.length >= MIN_GROUP_SIZE) {
              hasMatches = true;
              // Swap with random different color
              let newColor;
              do {
                newColor = randomColor();
              } while (newColor === grid[row][col]);
              grid[row][col] = newColor;
            }
          }
        }
        attempts++;
      }
    }

    // Start Timer (accurate using Date.now())
    function startTimer() {
      lastTimeUpdate = Date.now();
      
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        const now = Date.now();
        const delta = now - lastTimeUpdate;
        
        if (delta >= 1000) {
          time--;
          lastTimeUpdate = now;
          updateUI();
          
          if (time <= 10) {
            timeElement.classList.add('warning');
          } else {
            timeElement.classList.remove('warning');
          }
          
          if (time <= 0) {
            gameOver();
          }
        }
      }, 100);
    }

    // Update UI
    function updateUI() {
      scoreElement.textContent = score;
      timeElement.textContent = time;
      bombBtn.textContent = `💣 Bomb (${bombs})`;
      shuffleBtn.textContent = `🔀 Shuffle (${shuffles})`;
      bombBtn.disabled = bombs <= 0 || isProcessing;
      shuffleBtn.disabled = shuffles <= 0 || isProcessing;
    }

    // Game Over
    function gameOver() {
      clearInterval(timerInterval);
      finalScoreElement.textContent = score;
      gameOverModal.classList.add('active');
    }

    // Restart Game
    function restartGame() {
      score = 0;
      time = INITIAL_TIME;
      bombs = 3;
      shuffles = 2;
      comboCount = 0;
      isProcessing = false;
      gameOverModal.classList.remove('active');
      timeElement.classList.remove('warning');
      
      createGrid();
      renderGrid();
      startTimer();
      updateUI();
    }

    // Watch Ad (simulated)
    function watchAd() {
      // Simulate ad watching
      const btn = event.target;
      btn.textContent = '⏳ Watching...';
      btn.disabled = true;
      
      setTimeout(() => {
        time += 10;
        updateUI();
        gameOverModal.classList.remove('active');
        timeElement.classList.remove('warning');
        btn.textContent = '📺 Watch Ad +10s';
        btn.disabled = false;
      }, 2000);
    }

    // Utility: Sleep
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Start the game
    init();
  </script>
