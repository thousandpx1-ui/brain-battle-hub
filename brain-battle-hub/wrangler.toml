#:schema node_modules/wrangler/config-schema.json
name = "brain-battle-hub"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "brain-battle-hub-db"
database_id = "create-new"

# ✅ ADD THIS (Durable Object binding)
[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "LeaderboardDO"

# ✅ ADD THIS (migration required)
[[migrations]]
tag = "v1"
new_classes = ["LeaderboardDO"]

[vars]
NODE_ENV = "production"